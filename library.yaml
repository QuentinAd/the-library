default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.agents/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.agents/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.agents/prompts/
  plugins:
    # Plugins are managed by Claude Code's own plugin system via the `claude
    # plugin` CLI. There is no fixed install dir — Claude Code caches each
    # plugin under ~/.claude/plugins/cache/<marketplace>/<plugin>/<version>/.
    # Library entries record where the marketplace lives; the install step
    # shells out to `claude plugin marketplace add` + `claude plugin install`.
    - claude_managed: true

symlinks:
  - from: ~/.agents/skills/
    to: ~/.claude/skills/
  - from: ~/.agents/agents/
    to: ~/.claude/agents/
  - from: ~/.agents/prompts/
    to: ~/.claude/commands/

library:
  skills: []
  agents: []
  prompts: []
  plugins:
    - name: proj
      description: Project lifecycle manager. Native /proj:<name> slash commands. Scaffolds projects from archetypes (minimal, data-pipeline, research-spike, product, custom), manages roadmaps/phases/tasks, runs retros, archives stale planning, and bridges to GitHub Projects.
      source: ~/dotfiles/agents/plugins-marketplace
      marketplace_name: dotfiles
