default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.agents/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.agents/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.agents/prompts/

symlinks:
  - from: ~/.agents/skills/
    to: ~/.claude/skills/
  - from: ~/.agents/agents/
    to: ~/.claude/agents/
  - from: ~/.agents/prompts/
    to: ~/.claude/commands/

library:
  skills:
    - name: proj
      description: Project lifecycle manager. Creates projects, manages roadmaps/phases/tasks in 0_planning/, discovers skills, mines patterns, and orchestrates parallel subagent execution.
      source: ~/dotfiles/agents/skills/proj/SKILL.md
  agents: []
  prompts: []
